name: release-macos

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (for manual runs)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-macos:
    runs-on: macos-latest
    env:
      APPLE_DEVELOPER_ID_APP: ${{ secrets.APPLE_DEVELOPER_ID_APP }}
      APPLE_NOTARY_KEYCHAIN_PROFILE: bullpen-notary
      APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
      APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}
      APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
      P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
      P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.value }}

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Import Developer ID certificate
        run: |
          if [[ -z "$P12_BASE64" || -z "$P12_PASSWORD" || -z "$APPLE_DEVELOPER_ID_APP" ]]; then
            echo "Missing signing secrets. Required: APPLE_DEVELOPER_ID_P12_BASE64, APPLE_DEVELOPER_ID_P12_PASSWORD, APPLE_DEVELOPER_ID_APP" >&2
            exit 1
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/bullpen-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"

          echo "$P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Store notarization credentials
        run: |
          if [[ -z "$APPLE_NOTARY_APPLE_ID" || -z "$APPLE_NOTARY_TEAM_ID" || -z "$APPLE_NOTARY_APP_PASSWORD" ]]; then
            echo "Missing notarization secrets. Required: APPLE_NOTARY_APPLE_ID, APPLE_NOTARY_TEAM_ID, APPLE_NOTARY_APP_PASSWORD" >&2
            exit 1
          fi

          xcrun notarytool store-credentials "$APPLE_NOTARY_KEYCHAIN_PROFILE" \
            --apple-id "$APPLE_NOTARY_APPLE_ID" \
            --team-id "$APPLE_NOTARY_TEAM_ID" \
            --password "$APPLE_NOTARY_APP_PASSWORD"

      - name: Package signed and notarized app
        run: |
          chmod +x tools/package-macos.sh tools/release-macos.sh tools/compile-scenarios.sh tools/guardrails.sh tools/smoke-app.sh install.sh
          tools/package-macos.sh \
            --output-dir "$RUNNER_TEMP/dist" \
            --version "${{ steps.tag.outputs.value }}" \
            --developer-id "$APPLE_DEVELOPER_ID_APP" \
            --notary-profile "$APPLE_NOTARY_KEYCHAIN_PROFILE" \
            --sign \
            --notarize

      - name: Upload GitHub release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ steps.tag.outputs.value }}" >/dev/null 2>&1 || \
            gh release create "${{ steps.tag.outputs.value }}" --title "${{ steps.tag.outputs.value }}" --notes ""
          gh release upload "${{ steps.tag.outputs.value }}" \
            "$RUNNER_TEMP/dist/Bullpen-macos.zip" \
            "$RUNNER_TEMP/dist/Bullpen-macos.sha256" \
            --clobber
